function saveToFirebase(){

function initFirebase(){
  setSyncStatus("connecting","Connecting...");

    if(snap.exists()){
      DATA=snap.val();

      if(!DATA.exp)DATA.exp=[];
      if(!DATA.rev)DATA.rev=[];
      if(!DATA.cashLog)DATA.cashLog=[];

      DATA={lo:SEED.lo.map(o=>({...o})),exp:SEED.exp.map(e=>({...e})),rev:SEED.rev.map(r=>({...r,payouts:r.payouts.map(p=>({...p}))})),cash:SEED.cash,cashLog:[...SEED.cashLog]};
      DATA_REF.set(JSON.parse(JSON.stringify(DATA)));
    }
    if(!listening){
      listening=true;
      DATA_REF.on("value",snap=>{
        if(snap.exists()){DATA=snap.val();if(!DATA.lo)DATA.lo=[];if(!DATA.exp)DATA.exp=[];if(!DATA.rev)DATA.rev=[];if(!DATA.cashLog)DATA.cashLog=[];render();}
      });
    }
    setSyncStatus("live","Live · synced");
    render();

    setSyncStatus("error","Firebase error — using local data");

  });
}

  DATA.cashLog=d.cashLog||[];
  saveToFirebase();render();
}

const pN=r=>(r.payouts||[]).filter(p=>p.status!=="paid").reduce((s,p)=>s+Number(p.amount||0),0);
const rN=r=>rG(r)-(r.payouts||[]).reduce((s,p)=>s+Number(p.amount||0),0);
const isF=r=>r.wireReceived&&(r.payouts||[]).length>0&&(r.payouts||[]).every(p=>p.status==="paid");

function calcNet(){
  const pp=(DATA.rev||[]).filter(r=>r.wireReceived).reduce((s,r)=>s+pN(r),0);
  const cn=(DATA.rev||[]).filter(r=>!r.wireReceived&&r.type==="confirmed").reduce((s,r)=>s+rN(r),0);
  const en=(DATA.rev||[]).filter(r=>!r.wireReceived&&r.type==="expected").reduce((s,r)=>s+rN(r),0);
  const ft=(DATA.exp||[]).filter(e=>e.status==="pending").reduce((s,e)=>s+Number(e.amount||0),0);
  const lt=(DATA.lo||[]).filter(o=>o.status==="pending"&&!o.linkedRevId).reduce((s,o)=>s+Number(o.amount||0),0);
  return{net:DATA.cash+cn+en-pp-ft-lt,con:DATA.cash+cn-pp-ft-lt,pp,cn,en,ft,lt};
}

function getDue(){
  const items=[];
  (DATA.lo||[]).filter(o=>o.status==="pending"&&!o.linkedRevId).forEach(o=>items.push({kind:"LO Obligation",name:`${o.fileName} (${o.loanOfficer})`,amount:o.amount,dueDate:o.dueDate}));
  (DATA.exp||[]).filter(e=>e.status==="pending").forEach(e=>items.push({kind:e.category==="payroll"?"Payroll":"Fixed Expense",name:e.name,amount:e.amount,dueDate:e.dueDate}));
  (DATA.rev||[]).filter(r=>r.wireReceived).forEach(r=>(r.payouts||[]).filter(p=>p.status!=="paid").forEach(p=>items.push({kind:"File Payout",name:`${p.payee} (${r.source})`,amount:p.amount,dueDate:p.dueDate||td()})));
  (DATA.rev||[]).filter(r=>!r.wireReceived).forEach(r=>(r.payouts||[]).filter(p=>p.status!=="paid"&&p.dueDate).forEach(p=>items.push({kind:"File Payout",name:`${p.payee} (${r.source})`,amount:p.amount,dueDate:p.dueDate})));
  return items.filter(i=>du(i.dueDate)<=S.dw).sort((a,b)=>du(a.dueDate)-du(b.dueDate));
}

function allP(){
  const rows=[];
  (DATA.rev||[]).forEach(r=>(r.payouts||[]).forEach(p=>rows.push({id:p.id,file:r.source,payee:p.payee,category:p.category||"Other",amount:p.amount,status:p.status,date:p.paidDate||p.dueDate||r.date})));
  (DATA.lo||[]).filter(o=>!o.linkedRevId).forEach(o=>rows.push({id:o.id,file:o.fileName,payee:o.payee||o.loanOfficer,category:o.category||"LO Commission",amount:o.amount,status:o.status==="paid"?"paid":"pending",date:o.paidDate||o.dueDate}));
  return rows.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
}

function getFc(){
  const map={};const t=td();
  const add=(date,amount,label)=>{if(!date)return;if(!map[date])map[date]={date,inflow:0,outflow:0,items:[]};map[date].items.push({label,amount});if(amount>0)map[date].inflow+=amount;else map[date].outflow+=Math.abs(amount);};
  const revs=S.fcm==="confirmed"?(DATA.rev||[]).filter(r=>r.type==="confirmed"||r.wireReceived):(DATA.rev||[]);
  revs.forEach(r=>{if(r.wireReceived)(r.payouts||[]).filter(p=>p.status!=="paid").forEach(p=>add(p.dueDate||t,-p.amount,`${p.payee} (${r.source})`));else add(r.date,rN(r),r.source);});
  (DATA.lo||[]).filter(o=>o.status==="pending"&&!o.linkedRevId).forEach(o=>add(o.dueDate,-o.amount,o.fileName||o.loanOfficer));
  (DATA.exp||[]).filter(e=>e.status==="pending").forEach(e=>add(e.dueDate,-e.amount,e.name));
  if(!map[t])map[t]={date:t,inflow:0,outflow:0,items:[]};
  let bal=DATA.cash;
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>{bal+=d.inflow-d.outflow;return{...d,balance:bal,sf:bal<0};});
}

function fChart(data){
  if(!data||data.length<2)return`<div class="emp">Add revenue and expenses to see forecast.</div>`;
  const W=700,H=240,PL=60,PR=12,PT=12,PB=38,cW=W-PL-PR,cH=H-PT-PB;
  const av=data.flatMap(d=>[d.balance,d.inflow,-d.outflow]);
  const mn=Math.min(0,...av),mx=Math.max(0,...av),rng=mx-mn||1;
  const mg=Math.pow(10,Math.floor(Math.log10(rng/5)));
  const nc=[1,2,5,10].map(f=>f*mg).find(f=>f>=rng/5)||mg*10;
  const yMn=Math.floor(mn/nc)*nc,yMx=Math.ceil(mx/nc)*nc,yR=yMx-yMn||1;
  const tks=[];for(let v=yMn;v<=yMx+nc*0.01;v+=nc)tks.push(Math.round(v*1e6)/1e6);
  const xO=i=>PL+(i/Math.max(data.length-1,1))*cW;
  const yO=v=>PT+cH-((v-yMn)/yR)*cH;
  const zY=yO(0);const st=cW/Math.max(data.length,1),bW=Math.max(3,Math.min(16,st*0.28));
  const path=data.map((d,i)=>`${i===0?"M":"L"}${xO(i).toFixed(1)},${yO(d.balance).toFixed(1)}`).join(" ");
  const ev=Math.ceil(data.length/8);
  let bars="",pts="";
  data.forEach((d,i)=>{
    const cx=xO(i);
    const tip=`${fmtS(d.date)} | Balance: ${fmt(d.balance)}\n${d.items.map(it=>`${it.label}: ${it.amount>0?"+":""}${fmt(it.amount)}`).join("\n")}`;
    if(d.inflow>0)bars+=`<rect x="${(cx-bW-1).toFixed(1)}" y="${Math.min(yO(d.inflow),zY).toFixed(1)}" width="${bW}" height="${Math.abs(yO(d.inflow)-zY).toFixed(1)}" fill="#059669" opacity=".8" rx="2"><title>${tip}</title></rect>`;
    if(d.outflow>0)bars+=`<rect x="${(cx+1).toFixed(1)}" y="${zY.toFixed(1)}" width="${bW}" height="${Math.abs(yO(-d.outflow)-zY).toFixed(1)}" fill="#dc2626" opacity=".8" rx="2"><title>${tip}</title></rect>`;
    pts+=`<circle cx="${cx.toFixed(1)}" cy="${yO(d.balance).toFixed(1)}" r="4" fill="${d.sf?"#dc2626":"#6366f1"}" stroke="#fff" stroke-width="1.5"><title>${tip}</title></circle>`;
  });
  const tls=tks.map(t=>`<line x1="${PL}" x2="${W-PR}" y1="${yO(t).toFixed(1)}" y2="${yO(t).toFixed(1)}" stroke="#e5e7eb" stroke-width="1"/><text x="${PL-5}" y="${(yO(t)+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#9ca3af">${fmtK(t)}</text>`).join("");
  const xl=data.map((d,i)=>i%ev===0?`<text x="${xO(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="10" fill="#9ca3af">${fmtS(d.date)}</text>`:"").join("");
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${tls}<line x1="${PL}" x2="${W-PR}" y1="${zY.toFixed(1)}" y2="${zY.toFixed(1)}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>${bars}<path d="${path}" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${pts}${xl}<g transform="translate(${PL},${H-4})"><rect x="0" y="-8" width="10" height="10" fill="#059669" opacity=".8" rx="1"/><text x="13" y="2" font-size="10" fill="#6b7280">Inflow</text><rect x="52" y="-8" width="10" height="10" fill="#dc2626" opacity=".8" rx="1"/><text x="65" y="2" font-size="10" fill="#6b7280">Outflow</text><line x1="112" x2="124" y1="-2" y2="-2" stroke="#6366f1" stroke-width="2.5"/><circle cx="118" cy="-2" r="3" fill="#6366f1"/><text x="128" y="2" font-size="10" fill="#6b7280">Balance</text></g></svg>`;
}

  }

  else if(S.tab==="revenue"){
    const arf=S.showRevF?`<div style="background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:12px">
      <div class="frow">
        <div style="flex:2;min-width:140px"><label class="lbl">Source / file name</label><input id="rf_sr" placeholder="File name"/></div>
        <div><label class="lbl">Type</label><select id="rf_tp"><option value="expected">Expected</option><option value="confirmed">Confirmed</option></select></div>
        <div><label class="lbl">Amount</label><input id="rf_am" type="number" placeholder="0"/></div>
        <div><label class="lbl">Date</label><input id="rf_dt" type="date" value="${td()}"/></div>
      </div>
      <button class="bgn bsm" onclick="addRev()">+ Add Revenue</button>
    </div>`:"";

    const revRows=aRev.length===0?`<tr><td colspan="7" class="emp">No active revenue entries.</td></tr>`:
      aRev.flatMap(r=>{
        if(S.editRevId===r.id)return[`<tr style="background:#f8f9fa">
          <td colspan="2"><input id="er_sr" value="${r.source}" style="width:140px"/></td>
          <td></td>
          <td><input id="er_am" type="number" value="${r.amount}" style="width:100px;text-align:right"/></td>
          <td><input id="er_dt" type="date" value="${r.date}" style="width:130px"/></td>
          <td><select id="er_tp"><option value="expected" ${r.type==="expected"?"selected":""}>Expected</option><option value="confirmed" ${r.type==="confirmed"?"selected":""}>Confirmed</option></select></td>
          <td style="text-align:right"><div class="acts"><button class="bgn bsm" onclick="saveEditRev('${r.id}')">✓</button><button class="bsm" onclick="S.editRevId=null;render()">✕</button></div></td>
        </tr>`];
        const pays=r.payouts||[];const pd=pP(r);const net=rN(r);
        const isEx=S.expRev===r.id;const pc=pays.filter(p=>p.status!=="paid").length;
        const badge=r.wireReceived?`<span class="pill pg">✓ Wire In</span>`:r.type==="confirmed"?`<span class="pill pb">Confirmed</span>`:`<span class="pill pa">Expected</span>`;
        const wireAction=r.wireReceived
          ?`<div style="font-size:11px;color:#059669;margin-top:3px;margin-left:14px">💲 Wire received ${fmtD(r.receivedDate)} <button class="bsm" onclick="event.stopPropagation();undoWire('${r.id}')" style="font-size:11px;color:#888;margin-left:4px;padding:1px 6px">↩ Undo</button></div>`
          :`<div style="margin-top:4px;margin-left:14px"><button class="bgn bsm" onclick="event.stopPropagation();openWire('${r.id}')">💲 Wire Received</button></div>`;
        const mainRow=`<tr style="${r.wireReceived?"background:#f0fdf4":""}">
          <td><button onclick="S.expRev=S.expRev==='${r.id}'?null:'${r.id}';render()" style="background:none;border:none;cursor:pointer;font-size:13px;font-family:inherit;text-align:left;padding:0;color:#1a1a1a;width:100%">
            ${isEx?"▾":"▸"} <b>${r.source}</b>${pays.length>0?` <span style="font-size:11px;color:#888">(${pc} pending)</span>`:""}
            ${wireAction}
          </button></td>
          <td style="text-align:right">${fmt(rG(r))}</td>
          <td style="text-align:right;color:#dc2626">${pd>0?`−${fmt(pd)}`:"—"}</td>
          <td style="text-align:right;font-weight:600">${fmt(net)}</td>
          <td style="color:#888">${fmtD(r.date)}</td>
          <td>${badge}</td>
          <td style="text-align:right"><div class="acts">
            ${!r.wireReceived?`<button class="bsm" onclick="S.editRevId='${r.id}';render()">✏</button><button class="bsm" onclick="toggleRevType('${r.id}')">${r.type==="expected"?"→ Confirm":"→ Unconfirm"}</button>`:""}
            <button class="bsm" onclick="delRev('${r.id}')" style="color:#dc2626">✕</button>
          </div></td>
        </tr>`;
        if(!isEx)return[mainRow];
        const payRows=pays.length===0?`<div style="font-size:13px;color:#aaa;margin-bottom:8px">No payouts yet.</div>`:
          `<table style="margin-bottom:8px"><thead><tr><th>Payee</th><th>Category</th><th style="text-align:right">Amount</th><th>Send by</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead><tbody>`+
          pays.map(p=>{
            if(S.editPayId===p.id&&S.editPayRev===r.id)return`<tr style="background:#fff">
              <td><input id="ep_py" value="${p.payee}" style="width:90px"/></td>
              <td><select id="ep_ct">${PC.map(c=>`<option value="${c}" ${p.category===c?"selected":""}>${c}</option>`).join("")}</select></td>
              <td><input id="ep_am" type="number" value="${p.amount}" style="width:90px;text-align:right"/></td>
              <td><input id="ep_dd" type="date" value="${p.dueDate||""}" style="width:130px"/></td>
              <td></td>
              <td style="text-align:right"><div class="acts"><button class="bgn bsm" onclick="saveEditPay('${r.id}','${p.id}')">✓</button><button class="bsm" onclick="S.editPayId=null;render()">✕</button></div></td>
            </tr>`;
            const ip=p.status==="paid";
            return`<tr style="${ip?"opacity:.65":""}">
              <td style="font-weight:500">${p.payee}</td><td>${cb(p.category)}</td>
              <td style="text-align:right;color:#dc2626">−${fmt(p.amount)}</td>
              <td style="color:#888">${fmtD(p.dueDate)}</td>
              <td>${ip?`<span class="pill pg">✓ Sent ${fmtD(p.paidDate)}</span>`:`<span class="pill po">Pending</span>`}</td>
              <td style="text-align:right"><div class="acts">
                <button class="bsm" onclick="S.editPayId='${p.id}';S.editPayRev='${r.id}';render()">✏</button>
                ${!ip&&r.wireReceived?`<button class="bgn bsm" onclick="markPayPaid('${r.id}','${p.id}')">✓ Sent</button>`:""}
                ${ip?`<button class="bsm" onclick="restorePay('${r.id}','${p.id}')">↺</button>`:""}
                <button class="bsm" onclick="delPay('${r.id}','${p.id}')" style="color:#dc2626">✕</button>
              </div></td>
            </tr>`;
          }).join("")+`</tbody></table>`;
        const expRow=`<tr><td colspan="7" class="psub">
          <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">File-related payouts</div>
          ${payRows}
          <div class="sfrm">
            <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:8px">Add Payout</div>
            <div class="frow">
              <div><label class="lbl">Payee</label><input id="ap_py_${r.id}" placeholder="Payee name"/></div>
              <div><label class="lbl">Category</label><select id="ap_ct_${r.id}">${PC.map(c=>`<option value="${c}">${c}</option>`).join("")}</select></div>
              <div><label class="lbl">Amount</label><input id="ap_am_${r.id}" type="number" placeholder="0"/></div>
              <div><label class="lbl">Send by</label><input id="ap_dd_${r.id}" type="date" value="${td()}"/></div>
            </div>
            <label class="ckr"><input type="checkbox" id="ap_lo_${r.id}" onchange="document.getElementById('ap_lox_${r.id}').style.display=this.checked?'block':'none'"/> 🔗 Also create as LO Obligation</label>
            <div id="ap_lox_${r.id}" style="display:none;padding-left:14px;border-left:2px solid #c7d2fe;margin-top:4px;margin-bottom:8px">
              <div class="frow">
                <div><label class="lbl">Loan officer name</label><input id="ap_ll_${r.id}" placeholder="LO name"/></div>
                <div><label class="lbl">LO due date</label><input id="ap_ld_${r.id}" type="date" value="${td()}"/></div>
              </div>
            </div>
            <button class="bdk bsm" onclick="addPay('${r.id}')">+ Add Payout</button>
          </div>
        </td></tr>`;
        return[mainRow,expRow];
      }).flat();
    const tG=aRev.reduce((s,r)=>s+rG(r),0),tPd=aRev.reduce((s,r)=>s+pP(r),0),tNt=aRev.reduce((s,r)=>s+rN(r),0);
    body=`<div class="card">
      <div class="sh"><span style="font-weight:600">Revenue</span><button class="${S.showRevF?"bsm":"bdk bsm"}" onclick="S.showRevF=!S.showRevF;render()">${S.showRevF?"✕ Cancel":"+ Add Revenue"}</button></div>
      ${arf}
      <div style="font-size:12px;color:#888;margin-bottom:10px">Click ▸ to expand a file and manage payouts. Click <b>Wire Received</b> when funds land.</div>
      <div style="overflow-x:auto"><table><thead><tr><th>Source</th><th style="text-align:right">Gross</th><th style="text-align:right">Payouts out</th><th style="text-align:right">Net remaining</th><th>Date</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead>
      <tbody>${revRows}</tbody>
      ${aRev.length?`<tfoot><tr><td style="color:#888;font-size:12px">Totals (${aRev.length} active files)</td><td style="text-align:right">${fmt(tG)}</td><td style="text-align:right;color:#dc2626">${tPd>0?`−${fmt(tPd)}`:"—"}</td><td style="text-align:right;color:#059669;font-weight:600">${fmt(tNt)}</td><td colspan="3"></td></tr></tfoot>`:""}
      </table></div>
    </div>`;
  }

  else if(S.tab==="funded"){
    const items=funded.length===0?`<div class="emp" style="padding:48px">No fully funded files yet.</div>`:
      funded.map(r=>{const tot=(r.payouts||[]).reduce((s,p)=>s+Number(p.amount||0),0),net=rG(r)-tot;return`<div class="fcd"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-weight:600;font-size:15px">${r.source}</div><div style="font-size:12px;color:#059669;margin-top:2px">💲 Wire received ${fmtD(r.receivedDate)}</div></div><div style="text-align:right"><div style="font-size:11px;color:#888">Gross</div><div style="font-weight:600">${fmt(rG(r))}</div></div></div><div style="border-top:1px solid #a7f3d0;padding-top:10px">${(r.payouts||[]).map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><div style="display:flex;gap:6px;align-items:center">${p.payee} ${cb(p.category)}</div><div style="display:flex;gap:8px;align-items:center"><span style="color:#dc2626">−${fmt(p.amount)}</span><span class="pill pg">✓ Sent ${fmtD(p.paidDate)}</span></div></div>`).join("")}<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #a7f3d0;font-weight:600"><span>Net retained</span><span style="color:#059669">${fmt(net)}</span></div></div></div>`;}).join("")+
      `<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid #eee;font-size:13px"><span style="color:#888">Total net retained</span><span style="font-weight:600;color:#059669">${fmt(funded.reduce((s,r)=>s+rG(r)-(r.payouts||[]).reduce((ps,p)=>ps+Number(p.amount||0),0),0))}</span></div>`;
    body=`<div class="card"><div style="font-weight:600;margin-bottom:4px">✓ Funded Files <span style="font-size:13px;font-weight:400;color:#888">(${funded.length} complete)</span></div><div style="font-size:12px;color:#888;margin-bottom:14px">Wire received and all distributions sent.</div>${items}</div>`;
  }

  else if(S.tab==="report"){
    const ap=allP();
    const fil=ap.filter(p=>{
      if(S.rCat!=="All"&&p.category!==S.rCat)return false;
      if(S.rPay!=="All"&&p.payee!==S.rPay)return false;
      if(S.rSt!=="All"&&p.status!==S.rSt)return false;
      if(S.rFl!=="All"&&p.file!==S.rFl)return false;
      if(S.rFr&&p.date&&p.date<S.rFr)return false;
      if(S.rTo&&p.date&&p.date>S.rTo)return false;
      return true;
    });
    const rT=fil.reduce((s,p)=>s+Number(p.amount||0),0);
    const rPd=fil.filter(p=>p.status==="paid").reduce((s,p)=>s+Number(p.amount||0),0);
    const bC={};fil.forEach(p=>{if(!bC[p.category])bC[p.category]=0;bC[p.category]+=Number(p.amount||0);});
    const bCA=Object.entries(bC).sort((a,b)=>b[1]-a[1]);
    const pays=["All",...new Set(ap.map(p=>p.payee).filter(Boolean))];
    const files=["All",...new Set(ap.map(p=>p.file).filter(Boolean))];
    body=`
    <div class="mgrid">
      <div class="met"><div class="mlb">Total (filtered)</div><div class="mvl">${fmt(rT)}</div></div>
      <div class="met"><div class="mlb">Paid / Sent</div><div class="mvl" style="color:#059669">${fmt(rPd)}</div></div>
      <div class="met"><div class="mlb">Pending</div><div class="mvl" style="color:#d97706">${fmt(rT-rPd)}</div></div>
    </div>
    ${bCA.length?`<div class="card">${bCA.map(([cat,tot])=>{const pct=rT>0?Math.round((tot/rT)*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${cb(cat)}</span><span style="font-weight:600">${fmt(tot)} <span style="color:#888;font-size:11px">${pct}%</span></span></div><div class="bbg"><div class="bfg" style="width:${pct}%"></div></div></div>`;}).join("")}</div>`:""}
    <div class="card">
      <div class="fgrid">
        <div><label class="lbl">Category</label><select onchange="S.rCat=this.value;render()">${["All",...PC].map(c=>`<option value="${c}" ${S.rCat===c?"selected":""}>${c}</option>`).join("")}</select></div>
        <div><label class="lbl">Payee</label><select onchange="S.rPay=this.value;render()">${pays.map(p=>`<option value="${p}" ${S.rPay===p?"selected":""}>${p}</option>`).join("")}</select></div>
        <div><label class="lbl">Status</label><select onchange="S.rSt=this.value;render()"><option value="All">All</option><option value="paid" ${S.rSt==="paid"?"selected":""}>Paid</option><option value="pending" ${S.rSt==="pending"?"selected":""}>Pending</option></select></div>
        <div><label class="lbl">File</label><select onchange="S.rFl=this.value;render()">${files.map(f=>`<option value="${f}" ${S.rFl===f?"selected":""}>${f}</option>`).join("")}</select></div>
        <div><label class="lbl">From</label><input type="date" value="${S.rFr}" onchange="S.rFr=this.value;render()"/></div>
        <div><label class="lbl">To</label><input type="date" value="${S.rTo}" onchange="S.rTo=this.value;render()"/></div>
      </div>
      <button onclick="S.rCat='All';S.rPay='All';S.rSt='All';S.rFl='All';S.rFr='';S.rTo='';render()" style="font-size:12px;background:none;border:none;color:#888;cursor:pointer;text-decoration:underline;padding:0;margin-top:4px">Clear filters</button>
    </div>
    <div class="card"><div style="font-weight:600;margin-bottom:10px">${fil.length} Payouts</div>
    <div style="overflow-x:auto"><table><thead><tr><th>File</th><th>Payee</th><th>Category</th><th style="text-align:right">Amount</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${fil.length===0?`<tr><td colspan="6" class="emp">No payouts match.</td></tr>`:fil.map(p=>`<tr><td style="color:#888">${p.file}</td><td style="font-weight:500">${p.payee}</td><td>${cb(p.category)}</td><td style="text-align:right">${fmt(p.amount)}</td><td style="color:#888">${fmtD(p.date)}</td><td>${p.status==="paid"?`<span class="pill pg">✓ Paid</span>`:`<span class="pill po">Pending</span>`}</td></tr>`).join("")}</tbody>
    ${fil.length?`<tfoot><tr><td colspan="3" style="color:#888;font-size:12px">Total</td><td style="text-align:right">${fmt(rT)}</td><td colspan="2"></td></tr></tfoot>`:""}
    </table></div></div>`;
  }

  else if(S.tab==="archive"){
    const lR=dLo.length===0?`<tr><td colspan="6" class="emp">No paid LO obligations yet.</td></tr>`:dLo.map(o=>`<tr style="color:#888"><td>${o.loanOfficer}</td><td>${o.fileName||"—"}</td><td style="text-align:right">${fmt(o.amount)}</td><td>${fmtD(o.dueDate)}</td><td>${fmtD(o.paidDate)}</td><td style="text-align:right"><div class="acts"><button class="bsm" onclick="restoreLo('${o.id}')">↺</button><button class="bsm" onclick="delLo('${o.id}')" style="color:#dc2626">✕</button></div></td></tr>`).join("");
    const eR=dExp.length===0?`<tr><td colspan="6" class="emp">No paid expenses yet.</td></tr>`:dExp.map(e=>`<tr style="color:#888"><td>${e.name}</td><td>${e.category}</td><td style="text-align:right">${fmt(e.amount)}</td><td>${fmtD(e.dueDate)}</td><td>${fmtD(e.paidDate)}</td><td style="text-align:right"><div class="acts">${(e.cadence==="weekly"||e.cadence==="monthly")?`<button class="bsm" onclick="genNext('${e.id}')">↻ Gen Next</button>`:""}<button class="bsm" onclick="restoreExp('${e.id}')">↺</button><button class="bsm" onclick="delExp('${e.id}')" style="color:#dc2626">✕</button></div></td></tr>`).join("");
    body=`
    <div class="card"><div style="font-weight:600;margin-bottom:10px">🗄 Paid LO Obligations</div>
    <table><thead><tr><th>Loan Officer</th><th>File Name</th><th style="text-align:right">Amount</th><th>Due Date</th><th>Paid On</th><th style="text-align:right">Actions</th></tr></thead><tbody>${lR}</tbody></table></div>
    <div class="card"><div style="font-weight:600;margin-bottom:10px">🗄 Paid Fixed Expenses</div>
    <table><thead><tr><th>Name</th><th>Category</th><th style="text-align:right">Amount</th><th>Due Date</th><th>Paid On</th><th style="text-align:right">Actions</th></tr></thead><tbody>${eR}</tbody></table></div>`;
  }

  const wh=S.wireModal?`<div class="wov"><div class="wmd">
    <div style="font-weight:600;font-size:16px;margin-bottom:4px">💲 Wire Received</div>
    <div style="font-size:13px;color:#888;margin-bottom:14px">Confirm amount and date. Cash on hand updates automatically.</div>
    <div style="margin-bottom:10px"><label class="lbl">Wire amount</label><input type="number" id="wm_am" value="${S.wireModal.amount}"/></div>
    <div style="margin-bottom:16px"><label class="lbl">Date received</label><input type="date" id="wm_dt" value="${S.wireModal.receivedDate}"/></div>
    <div style="display:flex;gap:8px"><button class="bgn" onclick="confirmWire('${S.wireModal.revId}')" style="flex:1">✓ Confirm</button><button onclick="S.wireModal=null;render()">Cancel</button></div>
  </div></div>`:"";

  root.innerHTML=`
  <div class="hdr">
    <div><div class="hdr-title">Cash Flow & Obligations Tracker</div><div class="hdr-sub">Allied Home Capital · Live sync across all users</div></div>
    <div class="hdr-acts">
      <div class="sync-bar" id="syncbar"><span class="dot ${S.syncStatus}"></span><span>${S.syncMsg}</span></div>
      <button class="bsm" onclick="doImport()">⬆ Import</button>
      <button class="bdk bsm" onclick="doExport()">⬇ Export</button>
    </div>
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="tab${S.tab===t.id?" on":""}" onclick="S.tab='${t.id}';render()">${t.l}</button>`).join("")}</div>
  ${body}${wh}`;
}

function saveCash(){const v=parseFloat(document.getElementById("ci")?.value);if(isNaN(v))return;DATA.cashLog=[{id:gid(),date:new Date().toISOString(),prev:DATA.cash,next:v},...(DATA.cashLog||[])];DATA.cash=v;S.editCash=false;saveToFirebase();render();}
function saveEditLo(id){const lo=document.getElementById("el_lo")?.value?.trim();const fn=document.getElementById("el_fn")?.value?.trim();const am=parseFloat(document.getElementById("el_am")?.value);const dd=document.getElementById("el_dd")?.value;if(!lo||!am||!dd)return;DATA.lo=DATA.lo.map(o=>o.id===id?{...o,loanOfficer:lo,fileName:fn,amount:am,dueDate:dd}:o);S.editLoId=null;saveToFirebase();render();}
function saveEditExp(id){const nm=document.getElementById("ee_nm")?.value?.trim();const ct=document.getElementById("ee_ct")?.value;const cd=document.getElementById("ee_cd")?.value;const am=parseFloat(document.getElementById("ee_am")?.value);const dd=document.getElementById("ee_dd")?.value;if(!nm||!am||!dd)return;DATA.exp=DATA.exp.map(e=>e.id===id?{...e,name:nm,category:ct,cadence:cd,amount:am,dueDate:dd}:e);S.editExpId=null;saveToFirebase();render();}
function saveEditRev(id){const sr=document.getElementById("er_sr")?.value?.trim();const am=parseFloat(document.getElementById("er_am")?.value);const dt=document.getElementById("er_dt")?.value;const tp=document.getElementById("er_tp")?.value;if(!sr||!am||!dt)return;DATA.rev=DATA.rev.map(r=>r.id===id?{...r,source:sr,amount:am,date:dt,type:tp}:r);S.editRevId=null;saveToFirebase();render();}
function saveEditPay(revId,pid){const py=document.getElementById("ep_py")?.value?.trim();const ct=document.getElementById("ep_ct")?.value;const am=parseFloat(document.getElementById("ep_am")?.value);const dd=document.getElementById("ep_dd")?.value;if(!py||!am)return;DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,payouts:(r.payouts||[]).map(p=>p.id===pid?{...p,payee:py,category:ct,amount:am,dueDate:dd||p.dueDate}:p)}:r);S.editPayId=null;S.editPayRev=null;saveToFirebase();render();}
function addExp(){const nm=document.getElementById("ef_nm")?.value?.trim();const ct=document.getElementById("ef_ct")?.value;const cd=document.getElementById("ef_cd")?.value;const am=parseFloat(document.getElementById("ef_am")?.value);const dd=document.getElementById("ef_dd")?.value;if(!nm||!am||!dd)return;DATA.exp.push({id:gid(),name:nm,category:ct,amount:am,dueDate:dd,cadence:cd,status:"pending",paidDate:null});S.showExpF=false;saveToFirebase();render();}
function addRev(){const sr=document.getElementById("rf_sr")?.value?.trim();const tp=document.getElementById("rf_tp")?.value;const am=parseFloat(document.getElementById("rf_am")?.value);const dt=document.getElementById("rf_dt")?.value;if(!sr||!am||!dt)return;DATA.rev.push({id:gid(),source:sr,amount:am,type:tp,date:dt,wireReceived:false,receivedDate:null,payouts:[]});S.showRevF=false;saveToFirebase();render();}
function addPay(revId){const py=document.getElementById(`ap_py_${revId}`)?.value?.trim();const ct=document.getElementById(`ap_ct_${revId}`)?.value;const am=parseFloat(document.getElementById(`ap_am_${revId}`)?.value);const dd=document.getElementById(`ap_dd_${revId}`)?.value;const clo=document.getElementById(`ap_lo_${revId}`)?.checked;const ll=document.getElementById(`ap_ll_${revId}`)?.value?.trim();const ld=document.getElementById(`ap_ld_${revId}`)?.value;if(!py||!am)return;const r=DATA.rev.find(r=>r.id===revId);const pid=gid();let loId=null;if(clo&&ld){const lo={id:gid(),loanOfficer:ll||py,fileName:r?.source||"",amount:am,dueDate:ld,status:"pending",paidDate:null,linkedRevId:revId,linkedPayoutId:pid,category:ct,payee:ll||py};loId=lo.id;DATA.lo.push(lo);}DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,payouts:[...(r.payouts||[]),{id:pid,payee:py,category:ct,amount:am,dueDate:dd||td(),status:"pending",paidDate:null,linkedLoId:loId}]}:r);saveToFirebase();render();}
function markLoPaid(id){DATA.lo=DATA.lo.map(o=>o.id===id?{...o,status:"paid",paidDate:td()}:o);saveToFirebase();render();}
function restoreLo(id){DATA.lo=DATA.lo.map(o=>o.id===id?{...o,status:"pending",paidDate:null}:o);saveToFirebase();render();}
function delLo(id){if(!confirm("Delete this LO obligation?"))return;DATA.lo=DATA.lo.filter(o=>o.id!==id);saveToFirebase();render();}
function markExpPaid(id){const t=DATA.exp.find(e=>e.id===id);DATA.exp=DATA.exp.map(e=>e.id===id?{...e,status:"paid",paidDate:td()}:e);if(t?.cadence){const n=ai(t.dueDate,t.cadence);if(!DATA.exp.some(e=>e.status==="pending"&&e.name===t.name&&e.dueDate===n))DATA.exp.push({...t,id:gid(),dueDate:n,status:"pending",paidDate:null});}saveToFirebase();render();}
function restoreExp(id){DATA.exp=DATA.exp.map(e=>e.id===id?{...e,status:"pending",paidDate:null}:e);saveToFirebase();render();}
function delExp(id){if(!confirm("Delete this expense?"))return;DATA.exp=DATA.exp.filter(e=>e.id!==id);saveToFirebase();render();}
function genNext(id){const t=DATA.exp.find(e=>e.id===id);if(!t?.cadence)return;const n=ai(t.dueDate,t.cadence);if(!DATA.exp.some(e=>e.status==="pending"&&e.name===t.name&&e.dueDate===n))DATA.exp.push({...t,id:gid(),dueDate:n,status:"pending",paidDate:null});saveToFirebase();render();}
function toggleRevType(id){DATA.rev=DATA.rev.map(r=>r.id===id?{...r,type:r.type==="expected"?"confirmed":"expected"}:r);saveToFirebase();render();}
function delRev(id){if(!confirm("Delete this revenue entry?"))return;DATA.rev=DATA.rev.filter(r=>r.id!==id);saveToFirebase();render();}
function markPayPaid(revId,pid){DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,payouts:(r.payouts||[]).map(p=>p.id===pid?{...p,status:"paid",paidDate:td()}:p)}:r);const rev=DATA.rev.find(r=>r.id===revId);const payout=(rev?.payouts||[]).find(p=>p.id===pid);if(payout?.linkedLoId)DATA.lo=DATA.lo.map(o=>o.id===payout.linkedLoId?{...o,status:"paid",paidDate:td()}:o);saveToFirebase();render();}
function restorePay(revId,pid){DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,payouts:(r.payouts||[]).map(p=>p.id===pid?{...p,status:"pending",paidDate:null}:p)}:r);saveToFirebase();render();}
function delPay(revId,pid){if(!confirm("Delete this payout?"))return;const rev=DATA.rev.find(r=>r.id===revId);const p=(rev?.payouts||[]).find(p=>p.id===pid);if(p?.linkedLoId)DATA.lo=DATA.lo.filter(o=>o.id!==p.linkedLoId);DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,payouts:(r.payouts||[]).filter(p=>p.id!==pid)}:r);saveToFirebase();render();}
function openWire(revId){const r=DATA.rev.find(r=>r.id===revId);S.wireModal={revId,amount:String(r.amount),receivedDate:td()};render();}
function undoWire(revId){if(!confirm("Undo wire received?"))return;const r=DATA.rev.find(r=>r.id===revId);if(!r)return;const prev=DATA.cash;DATA.cash=Math.max(0,DATA.cash-rG(r));DATA.cashLog=[{id:gid(),date:new Date().toISOString(),prev,next:DATA.cash,note:`Wire reversed: ${r.source}`},...(DATA.cashLog||[])];DATA.rev=DATA.rev.map(x=>x.id===revId?{...x,wireReceived:false,receivedDate:null,type:"confirmed"}:x);saveToFirebase();render();}
function confirmWire(revId){const am=parseFloat(document.getElementById("wm_am")?.value);const dt=document.getElementById("wm_dt")?.value;if(isNaN(am))return;const src=DATA.rev.find(r=>r.id===revId)?.source||"";DATA.rev=DATA.rev.map(r=>r.id===revId?{...r,type:"confirmed",wireReceived:true,receivedDate:dt,amount:am}:r);const nxt=DATA.cash+am;DATA.cashLog=[{id:gid(),date:new Date().toISOString(),prev:DATA.cash,next:nxt,note:`Wire received: ${src}`},...(DATA.cashLog||[])];DATA.cash=nxt;S.wireModal=null;saveToFirebase();render();}

initFirebase();
</script>
</body>
